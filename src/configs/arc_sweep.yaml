training:
  seed: 0
  resume_from_checkpoint: null
  inference_mode: mean
  batch_size: 8
  gradient_accumulation_steps: 8
  total_num_steps: 1000
  log_every_n_steps: 10
  eval_every_n_logs: 10
  save_checkpoint_every_n_logs: null
  learning_rate: 4e-4
  prior_kl_coeff: 1e-4
  mixed_precision: True
  online_data_augmentation: True
  task_generator:
    num_workers: 4
    num_pairs: 4
    class: ARC
    only_n_tasks: 5
  train_datasets:

eval:
  eval_datasets:
  
  # Use JSON datasets instead of generators for memory efficiency
  test_datasets:
    - generator: ARC
      task_generator_kwargs:
      name: arc_train_all
      num_pairs: 4
      length: 32
      batch_size: 16
      num_tasks_to_show: 16
    - generator: ARC
      task_generator_kwargs:
        only_n_tasks: ${training.task_generator.only_n_tasks}
      name: arc_sweep
      num_pairs: 4
      length: 32
      batch_size: 16
      num_tasks_to_show: 16
      inference_mode: gradient_ascent
      inference_kwargs:
        num_steps: 2
        lr: 0.1
        optimizer: adam
        optimizer_kwargs:
          b2: 0.9
        track_progress: True  # CRITICAL: No progress tracking to save memory
    - generator: ARC
      task_generator_kwargs:
        only_n_tasks: ${training.task_generator.only_n_tasks}
      name: arc_sweep
      num_pairs: 4
      length: 32
      batch_size: 16
      num_tasks_to_show: 16
      inference_mode: random_search
      inference_kwargs:
        num_samples: 5
        scale: 1.0
        include_mean_latent: True
        include_all_latents: False
        track_progress: True   
  # Remove generator datasets entirely
  json_datasets: []

  # Skip heavy visualizations during evaluation to save memory
  light_logging: True

encoder_transformer:
  _target_: models.utils.EncoderTransformerConfig
  max_rows: 30
  max_cols: 30
  num_layers: 2
  transformer_layer:
    _target_: models.utils.TransformerLayerConfig
    num_heads: 8
    emb_dim_per_head: 32
    mlp_dim_factor: 4.0
    dropout_rate: 0.0
    attention_dropout_rate: 0.0
  latent_dim: 32
  variational: True
  latent_projection_bias: False

decoder_transformer:
  _target_: models.utils.DecoderTransformerConfig
  max_rows: 30
  max_cols: 30
  num_layers: 2
  transformer_layer:
    _target_: models.utils.TransformerLayerConfig
    num_heads: 8
    emb_dim_per_head: 32
    mlp_dim_factor: 4.0
    dropout_rate: 0.0
    attention_dropout_rate: 0.0